name: Linux

on:
  push:
    branches-ignore: ["paper", "candidate-install"]
  pull_request:
    branches:
      - development
      - master

permissions:
  contents: read

jobs:
  style-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Tabs
        run: .github/workflows/style/check_tabs.py

  editorconfig-compliance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: update aptitude
        run: sudo apt update
      - name: installing npm
        run: sudo apt install npm
      - name: installing eclint
        run: npm install -g eclint
      - name: EditorConfigCompliance
        run: eclint check src/
  documentation-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: checking documentation coverage
        run: python3 scripts/checkdoc.py
  build-docs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: installing preliminaries
        run: bash .github/workflows/dependencies-ubuntu-24.04.sh
      - name: make
        run: bash .github/workflows/build-docs.sh

      - name: upload documentation
        if: always()
        id: upload_report
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/build/html

      - name: Add report link to summary
        if: always()
        run: |
          echo "## 📄 Documentation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[⬇️ Click here to download](${{ steps.upload_report.outputs.artifact-url }})" >> $GITHUB_STEP_SUMMARY

  test-2d-22-04:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: installing preliminaries
      run: bash .github/workflows/dependencies-ubuntu-22.04.sh
    - name: configure (2d)
      run: ./configure --dim=2 
    - name: make
      run: make
    - name: regression tests
      run: scripts/runtests.py --serial --no-coverage --dim=2 --benchmark=github  --timeout=200 --no-backspace
    - name: parallelism check
      run: scripts/runtests.py tests/Unit/ --check-mpi --dim=2 --no-backspace
    - name: create report
      if: always()
      run: python3 scripts/package_report.py --name test-2d-22-04
    - name: report artifact summary
      if: always()
      run: |
        name="test-2d-22-04"
        echo "### Report bundle: $name" >> $GITHUB_STEP_SUMMARY
        if [ -d "$name" ]; then
          echo "Files: $(find "$name" -type f | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "Run pages: $(find "$name/report" -maxdepth 1 -type f -name '*.html' 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "Assets: $(find "$name/tests" -type f 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
        else
          echo "Report directory missing" >> $GITHUB_STEP_SUMMARY
        fi
    - name: upload report
      if: always()
      id: upload_report
      uses: actions/upload-artifact@v4
      with:
        name: test-2d-22-04
        path: test-2d-22-04
    - name: Add report link to summary
      if: always()
      run: |
        echo "## 📄 Report: test-2d-22-04" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "[⬇️ Click here to download](${{ steps.upload_report.outputs.artifact-url }})" >> $GITHUB_STEP_SUMMARY

