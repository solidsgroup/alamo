name: Install

on:
  push:
    branches: ["development", "master","candidate","candidate-install"]
  pull_request:
    branches:
    - development

permissions:
  contents: read

jobs:
  install-ubuntu-22-04:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: running the install script
      run: source .github/workflows/dependencies-ubuntu-22.04.sh
    - name: build and test
      run: bash .github/workflows/build-and-test.sh
  install-ubuntu-24-04:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: running the install script
      run: source .github/workflows/dependencies-ubuntu-24.04.sh
    - name: build and test
      run: bash .github/workflows/build-and-test.sh
    - name: documentation
      run: bash .github/workflows/build-docs.sh
    - name: python
      run: bash .github/workflows/python.sh
  install-python:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: running the install script
      run: source .github/workflows/dependencies-ubuntu-24.04.sh
    - name: python
      run: bash .github/workflows/python.sh
  install-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: running the install script
      run: source .github/workflows/install-macos.sh

