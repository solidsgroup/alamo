---
name: Coverage

"on":
  push:
    branches:
      - development
  pull_request:
    branches:
      - development

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-coverage:
    name: Run Regression Test Suite & Build Documentation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Dependencies
        run: bash .github/workflows/dependencies-ubuntu-24.04.sh
      - name: Configure (2D)
        continue-on-error: true
        run: ./configure --dim=2 --coverage --comp=g++
      - name: Build (2D)
        continue-on-error: true
        run: make
      - name: Configure (3D)
        continue-on-error: true
        run: ./configure --dim=3 --coverage --comp=g++
      - name: Build (3D)
        continue-on-error: true
        run: make
      - name: Regression Tests & Coverage (2D/3D)
        continue-on-error: true
        run: >
          scripts/runtests.py --serial
          --timeout=50 --permit-timeout
          --coverage --no-backspace --comp=g++
      - name: Generate Coverage Report
        run: make cov-report
      - name: upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./cov
      - name: Generate Documentation
        run: make docs
      - name: Compile GitHub Pages
        run: make githubpages
      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: githubpages
  deploy-documentation:
    name: Deploy Documentation
    needs: test-coverage
    if: ${{ github.ref == 'refs/heads/development' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy Documentation
        uses: actions/deploy-pages@v4
